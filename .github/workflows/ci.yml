name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-lint-test-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Syntax and route checks
        run: npm run check

      - name: Smoke test
        run: npm run smoke

      - name: Dependency vulnerability scan
        run: npm audit --omit=dev --audit-level=critical
