<!DOCTYPE html>
<html>
<head>
    <title>Check Login Status</title>
    <style>
        body { font-family: Arial; padding: 40px; background: #f5f5f5; }
        .status { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: 0 auto; }
        .label { font-weight: bold; color: #666; }
        .value { color: #0e5e3f; margin-bottom: 10px; }
        .warning { background: #fff3cd; padding: 15px; border-radius: 5px; margin-top: 20px; }
        .success { background: #d4edda; padding: 15px; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="status">
        <h2>Current Login Status</h2>
        <div class="label">Logged In:</div>
        <div class="value" id="isLoggedIn"></div>
        
        <div class="label">User Role:</div>
        <div class="value" id="userRole"></div>
        
        <div class="label">Admin Role:</div>
        <div class="value" id="adminRole"></div>
        
        <div class="label">Admin ID:</div>
        <div class="value" id="adminId"></div>
        
        <div id="message"></div>
        
        <button onclick="window.location.href='/login'" style="margin-top: 20px; padding: 10px 20px; background: #0e5e3f; color: white; border: none; border-radius: 5px; cursor: pointer;">
            Go to Login
        </button>
        
        <button onclick="window.location.href='/super-admin-borrowed-books'" style="margin-top: 20px; margin-left: 10px; padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">
            Try Borrowed Books
        </button>
    </div>
    
    <script>
        const isLoggedIn = sessionStorage.getItem("isLoggedIn");
        const userRole = sessionStorage.getItem("userRole");
        const adminRole = sessionStorage.getItem("adminRole");
        const adminId = sessionStorage.getItem("adminId");
        
        document.getElementById("isLoggedIn").textContent = isLoggedIn || "Not set";
        document.getElementById("userRole").textContent = userRole || "Not set";
        document.getElementById("adminRole").textContent = adminRole || "Not set";
        document.getElementById("adminId").textContent = adminId || "Not set";
        
        const messageDiv = document.getElementById("message");
        
        if (isLoggedIn === "true" && userRole === "admin" && adminRole === "super_admin") {
            messageDiv.className = "success";
            messageDiv.innerHTML = "✅ <strong>You are logged in as Super Admin!</strong><br>You should be able to access the Borrowed Books page.";
        } else if (isLoggedIn === "true" && adminRole === "system_admin") {
            messageDiv.className = "warning";
            messageDiv.innerHTML = "⚠️ <strong>You are logged in as System Admin</strong><br>For Super Admin pages, use: <a href='/admin-borrowed-books'>/admin-borrowed-books</a>";
        } else {
            messageDiv.className = "warning";
            messageDiv.innerHTML = "❌ <strong>You are NOT logged in as Super Admin</strong><br>Please log in with super admin credentials to access this page.";
        }
    </script>
</body>
</html>
