<!-- Notification Bell - Universal Component for All Roles -->
<!-- Add this snippet to the header/admin-info section of any dashboard page -->
<!-- Role-specific IDs: student*, admin*, or superAdmin* -->

<div class="notification-container" id="{{ROLE}}NotificationContainer">
  <button class="notif-btn" id="{{ROLE}}NotifBell" title="Notifications" aria-label="Notifications" aria-expanded="false" role="button">
    <span class="material-symbols-outlined">notifications</span>
    <span class="notif-badge" id="{{ROLE}}NotifBadge" style="display: none;">0</span>
  </button>

  <!-- Notification Dropdown Panel (will be moved to body via portal fix) -->
  <div class="student-notif-panel" id="{{ROLE}}NotifPanel" style="display: none;">
    <div class="notif-header">
      <h3>Notifications</h3>
      <div class="notif-actions">
        <button class="notif-action-btn" id="notifMarkAllBtn" title="Mark all as read" aria-label="Mark all as read">
          <span class="material-symbols-outlined">done_all</span>
        </button>
        <button class="notif-action-btn" id="notifSettingsBtn" title="Notification settings" aria-label="Notification settings"  >
          <span class="material-symbols-outlined">settings</span>
        </button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="notif-tabs">
      <button class="notif-tab active" id="tabAll" data-tab="all">
        <span class="material-symbols-outlined">list</span>
        All
      </button>
      <button class="notif-tab" id="tabUnread" data-tab="unread">
        <span class="material-symbols-outlined">mark_as_unread</span>
        Unread
      </button>
    </div>

    <!-- Notifications List -->
    <div class="notif-list" id="notifList">
      <div class="notif-loading">Loading notifications...</div>
    </div>

    <!-- Footer -->
    <div class="notif-footer">
      <button class="notif-see-more" id="notifSeeMore">See previous notifications</button>
    </div>
  </div>
</div>
