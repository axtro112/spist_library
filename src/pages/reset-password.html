<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - SPIST Library Management System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 20px;
      }

      .reset-container {
        background: white;
        border-radius: 15px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        padding: 50px 40px;
        max-width: 450px;
        width: 100%;
        animation: slideIn 0.5s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .reset-header {
        text-align: center;
        margin-bottom: 35px;
      }

      .reset-header .icon {
        font-size: 50px;
        color: #4caf50;
        margin-bottom: 15px;
      }

      .reset-header h1 {
        color: #2e7d32;
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 10px;
      }

      .reset-header p {
        color: #666;
        font-size: 14px;
        margin: 0;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        color: #2e7d32;
        font-weight: 600;
        margin-bottom: 8px;
        display: block;
      }

      .form-group input {
        width: 100%;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        padding: 12px 15px;
        font-size: 15px;
        transition: all 0.3s;
        font-family: inherit;
      }

      .form-group input:focus {
        outline: none;
        border-color: #4caf50;
        box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
      }

      .password-input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }

      .password-input-wrapper input {
        width: 100%;
        padding-right: 45px;
      }

      .password-input-wrapper .toggle-password {
        position: absolute;
        right: 15px;
        background: none;
        border: none;
        color: #4caf50;
        cursor: pointer;
        font-size: 18px;
        transition: color 0.2s;
        padding: 5px 10px;
      }

      .password-input-wrapper .toggle-password:hover {
        color: #2e7d32;
      }

      .btn-reset {
        background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
        color: white;
        font-weight: 700;
        border: none;
        padding: 14px;
        border-radius: 8px;
        width: 100%;
        margin-top: 25px;
        font-size: 16px;
        transition: all 0.3s;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
      }

      .btn-reset:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        color: white;
      }

      .btn-reset:active {
        transform: translateY(0);
      }

      .btn-reset:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .alert {
        border-radius: 8px;
        border: none;
        margin-bottom: 20px;
        animation: fadeIn 0.3s ease-out;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .alert-danger {
        background-color: #ffebee;
        color: #c62828;
      }

      .alert-success {
        background-color: #e8f5e9;
        color: #1b5e20;
      }

      .alert-info {
        background-color: #e3f2fd;
        color: #0d47a1;
      }

      .loading-spinner {
        display: none;
        text-align: center;
        margin-bottom: 20px;
      }

      .spinner-border {
        color: #4caf50;
        width: 30px;
        height: 30px;
      }

      .back-to-login {
        text-align: center;
        margin-top: 25px;
      }

      .back-to-login a {
        color: #4caf50;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s;
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }

      .back-to-login a:hover {
        color: #2e7d32;
        transform: translateX(-3px);
      }

      .password-requirements {
        background: #f1f8f6;
        padding: 15px;
        border-radius: 8px;
        margin-top: 20px;
        font-size: 13px;
        color: #2e7d32;
        border-left: 4px solid #4caf50;
      }

      .password-requirements strong {
        color: #1b5e20;
        display: block;
        margin-bottom: 8px;
      }

      .password-requirements ul {
        margin: 0;
        padding-left: 20px;
      }

      .password-requirements li {
        margin: 5px 0;
      }

      .match-indicator {
        font-size: 12px;
        margin-top: 5px;
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .match-indicator.match {
        color: #2e7d32;
      }

      .match-indicator.no-match {
        color: #c62828;
      }

      .match-icon {
        font-size: 14px;
      }

      @media (max-width: 480px) {
        .reset-container {
          padding: 30px 20px;
        }

        .reset-header h1 {
          font-size: 24px;
        }

        .reset-header .icon {
          font-size: 40px;
        }
      }
    </style>
  </head>
  <body>
    <div class="reset-container">
      <div class="reset-header">
        <div class="icon">
          <img src="/img/school-logo-large.png" alt="SPIST Logo" style="width: 80px; height: auto;">
        </div>
        <h1>Reset Password</h1>
        <p>Create a new secure password for your account</p>
      </div>

      <div id="messageContainer"></div>

      <form id="resetForm">
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <div class="password-input-wrapper">
            <input
              type="password"
              class="form-control"
              id="newPassword"
              placeholder="Enter new password"
              required
              minlength="6"
            />
            <button
              type="button"
              class="toggle-password"
              onclick="togglePassword('newPassword')"
              title="Show/Hide password"
            >
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-input-wrapper">
            <input
              type="password"
              class="form-control"
              id="confirmPassword"
              placeholder="Confirm new password"
              required
              minlength="6"
            />
            <button
              type="button"
              class="toggle-password"
              onclick="togglePassword('confirmPassword')"
              title="Show/Hide password"
            >
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="match-indicator" id="matchIndicator"></div>
        </div>

        <div class="password-requirements">
          <strong>✓ Password Requirements:</strong>
          <ul>
            <li id="req-length">At least 6 characters</li>
            <li id="req-match">Passwords must match</li>
            <li>Use letters, numbers, and symbols for security</li>
          </ul>
        </div>

        <div class="loading-spinner" id="loadingSpinner">
          <div class="spinner-border" role="status"></div>
          <div style="margin-top: 10px; color: #4caf50; font-weight: 600;">
            Resetting password...
          </div>
        </div>

        <button type="submit" class="btn-reset" id="submitBtn">
          <i class="fas fa-key"></i> Reset Password
        </button>
      </form>

      <div class="back-to-login">
        <a href="/login">
          <i class="fas fa-arrow-left"></i> Back to Login
        </a>
      </div>
    </div>

    <script src="../../js/reset-password.js"></script>
  </body>
</html>
