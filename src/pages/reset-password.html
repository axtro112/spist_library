<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - SPIST Library Management System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/login.css" />
    <link rel="stylesheet" href="/css/backup.css" />
  </head>
  <body>
    <div class="reset-container">
      <div class="reset-header">
        <div class="icon">
          <img src="/img/school-logo-large.png" alt="SPIST Logo" class="logo-image">
        </div>
        <h1>Reset Password</h1>
        <p>Create a new secure password for your account</p>
      </div>

      <div id="messageContainer"></div>

      <form id="resetForm">
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <div class="password-input-wrapper">
            <input
              type="password"
              class="form-control"
              id="newPassword"
              placeholder="Enter new password"
              required
              minlength="6"
            />
            <button
              type="button"
              class="toggle-password"
              onclick="togglePassword('newPassword')"
              title="Show/Hide password"
            >
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-input-wrapper">
            <input
              type="password"
              class="form-control"
              id="confirmPassword"
              placeholder="Confirm new password"
              required
              minlength="6"
            />
            <button
              type="button"
              class="toggle-password"
              onclick="togglePassword('confirmPassword')"
              title="Show/Hide password"
            >
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="match-indicator" id="matchIndicator"></div>
        </div>

        <div class="password-requirements">
          <strong>✓ Password Requirements:</strong>
          <ul>
            <li id="req-length">At least 6 characters</li>
            <li id="req-match">Passwords must match</li>
            <li>Use letters, numbers, and symbols for security</li>
          </ul>
        </div>

        <div class="loading-spinner" id="loadingSpinner">
          <div class="spinner-border" role="status"></div>
          <div class="success-hint">
            Resetting password...
          </div>
        </div>

        <button type="submit" class="btn-reset" id="submitBtn">
          <i class="fas fa-key"></i> Reset Password
        </button>
      </form>

      <div class="back-to-login">
        <a href="/login">
          <i class="fas fa-arrow-left"></i> Back to Login
        </a>
      </div>
    </div>

    <script src="../../js/reset-password.js"></script>
  </body>
</html>
