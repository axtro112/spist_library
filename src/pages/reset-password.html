<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/img/school-logo-large.png" />
    <link rel="stylesheet" href="/css/auth-layout.css" />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- JavaScript -->
    <script src="/js/csrf-helper.js" defer></script>
    <script src="/js/reset-password.js" defer></script>

    <title>Reset Password - SPIST Library</title>
  </head>

  <body>
    <div class="auth-container">
      <!-- Left Panel - Image Side -->
      <div class="image-panel" style="background-image: url('/img/schoolppp.png');">
        <div class="image-content">
          <div class="logo-section">
            <a href="/" title="Go to Home">
              <img src="/img/school-logo-large.png" alt="SPIST Logo" />
            </a>
            <div class="logo-text">
              <h1>Southern Philippines Institute</h1>
              <h2>Institute of Science & Technology</h2>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Panel - Green Panel -->
      <div class="green-panel">
        <div class="panel-content">
          <div class="decorative-line-top"></div>
          
          <div class="panel-header">
            <h1>Reset Password</h1>
            <p>Create a new secure password for your account</p>
          </div>

          <div class="decorative-line-middle"></div>

          <div id="messageContainer" class="error-message" style="display: none;"></div>

          <form id="resetForm" class="auth-form">
            <div class="form-group">
              <label for="newPassword">New Password</label>
              <div class="password-input-wrapper">
                <input
                  type="password"
                  id="newPassword"
                  name="newPassword"
                  placeholder="Enter new password"
                  required
                  minlength="6"
                />
                <button type="button" class="toggle-password" onclick="togglePassword('newPassword')">
                  <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
            </div>

            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <div class="password-input-wrapper">
                <input
                  type="password"
                  id="confirmPassword"
                  name="confirmPassword"
                  placeholder="Confirm new password"
                  required
                  minlength="6"
                />
                <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                  <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
              <div class="match-indicator" id="matchIndicator"></div>
            </div>

            <div class="password-requirements">
              <strong style="color: white;">✓ Password Requirements:</strong>
              <ul style="color: rgba(255, 255, 255, 0.9); margin-top: 8px; padding-left: 20px;">
                <li id="req-length">At least 6 characters</li>
                <li id="req-match">Passwords must match</li>
                <li>Use letters, numbers, and symbols for security</li>
              </ul>
            </div>

            <div class="loading-spinner" id="loadingSpinner" style="display: none; text-align: center; margin: 20px 0; color: white;">
              <div style="display: inline-block; width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite;"></div>
              <div style="margin-top: 10px; font-size: 14px;">
                Resetting password...
              </div>
            </div>

            <button type="submit" class="auth-button primary-button" id="submitBtn">
              <i class="fas fa-key"></i> Reset Password
            </button>
          </form>

          <div class="auth-redirect">
            <p><a href="/login">← Back to Login</a></p>
          </div>

          <div class="decorative-line-bottom"></div>
        </div>
      </div>
    </div>

    <script>
      function togglePassword(fieldId) {
        const passwordField = document.getElementById(fieldId);
        const button = passwordField.parentElement.querySelector('.toggle-password');
        const eyeIcon = button.querySelector('.eye-icon');
        
        if (passwordField.type === 'password') {
          passwordField.type = 'text';
          eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
        } else {
          passwordField.type = 'password';
          eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        }
      }
    </script>
  </body>
</html>
