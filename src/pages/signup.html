<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/img/school-logo-large.png" />
    <link rel="stylesheet" href="/css/auth-layout.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <script src="/js/csrf-helper.js"></script>
    <script src="/js/signup.js" defer></script>

    <title>Sign Up - SPIST Library</title>
  </head>

  <body>
    <div class="auth-container">
      <!-- Left Panel - Image Side -->
      <div class="image-panel" style="background-image: url('/img/schoolppp1.png');">
        <div class="image-content">
          <div class="logo-section">
            <a href="/" title="Go to Home">
              <img src="/img/school-logo-large.png" alt="SPIST Logo" />
            </a>
            <div class="logo-text">
              <h1>Southern Philippines Institute</h1>
              <h2>Institute of Science & Technology Tools</h2>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Panel - Green Panel -->
      <div class="green-panel">
        <div class="panel-content">
          <div class="decorative-line-top"></div>
          <div class="panel-header">
            <h1>SPIST Library</h1>
          </div>

          <div class="decorative-line-middle"></div>

          <div id="errorMessage" class="error-message" style="display: none;"></div>

          <!-- Step Indicator -->
          <div class="step-indicator">
            <div class="step active" id="step-indicator-1">
              <span class="step-number">1</span>
              <span class="step-label">Identity</span>
            </div>
            <div class="step" id="step-indicator-2">
              <span class="step-number">2</span>
              <span class="step-label">Academic Info</span>
            </div>
            <div class="step" id="step-indicator-3">
              <span class="step-number">3</span>
              <span class="step-label">Security</span>
            </div>
          </div>

          <form class="auth-form">
            <!-- STEP 1: Identity -->
            <div class="signup-step-1">
              <div class="form-group">
                <label for="fullname">Full Name</label>
                <input
                  type="text"
                  id="fullname"
                  name="fullname"
                  placeholder="Enter your full name"
                  required
                />
              </div>

              <div class="form-group">
                <label for="email">Email Address</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  pattern="c22-\d{4}-\d{2}@spist.edu.ph"
                  placeholder="c22-xxxx-xx@spist.edu.ph"
                  required
                />
              </div>

              <div class="form-group">
                <label for="student_id">Student ID</label>
                <input
                  type="text"
                  id="student_id"
                  name="student_id"
                  pattern="c22-\d{4}-\d{2}"
                  placeholder="c22-xxxx-xx"
                  required
                />
              </div>

              <button type="button" class="auth-button primary-button" id="goToStep2Btn">
                Next
              </button>
            </div>

            <!-- STEP 2: Academic Information -->
            <div class="signup-step-2" style="display: none;">
              <div class="form-group">
                <label for="student_type">User Type</label>
                <select id="student_type" name="student_type">
                  <option value="">-- Select User Type --</option>
                  <option value="Kindergarten">Kindergarten</option>
                  <option value="Junior High School">Junior High School</option>
                  <option value="Senior High School">Senior High School</option>
                  <option value="College Student">College Student</option>
                  <option value="Faculty/Maintenance">Faculty/Maintenance</option>
                  <option value="Instructor">Instructor</option>
                </select>
              </div>

              <div class="form-group">
                <label for="department">Department</label>
                <input
                  type="text"
                  id="department"
                  name="department"
                  placeholder="e.g. BSIT, BSCS, Accounting, Faculty"
                />
              </div>

              <div class="form-group">
                <label for="year_level">Year Level</label>
                <input
                  type="text"
                  id="year_level"
                  name="year_level"
                  placeholder="e.g. 1st Year, 2nd Year, Faculty, Staff"
                />
              </div>

              <div class="button-group">
                <button type="button" class="auth-button secondary-button" id="goBackToStep1Btn">
                  Back
                </button>
                <button type="button" class="auth-button primary-button" id="goToStep3Btn">
                  Next
                </button>
              </div>
            </div>

            <!-- STEP 3: Security -->
            <div class="signup-step-3" style="display: none;">
              <div class="form-group">
                <label for="contact_number">Contact Number</label>
                <input
                  type="tel"
                  id="contact_number"
                  name="contact_number"
                  pattern="[0-9]{11}"
                  placeholder="09771683520"
                />
              </div>

              <div class="form-group">
                <label for="password">Password</label>
                <div class="password-input-wrapper">
                  <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter a strong password"
                  />
                  <button type="button" class="toggle-password" data-target="password" aria-label="Toggle password visibility">
                    <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                      <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                  </button>
                </div>
              </div>

              <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="password-input-wrapper">
                  <input
                    type="password"
                    id="confirmPassword"
                    name="confirmPassword"
                    placeholder="Re-enter your password"
                  />
                  <button type="button" class="toggle-password" data-target="confirmPassword" aria-label="Toggle password visibility">
                    <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                      <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                  </button>
                </div>
              </div>

              <div class="button-group">
                <button type="button" class="auth-button secondary-button" id="goBackToStep2Btn">
                  Back
                </button>
                <button type="submit" class="auth-button primary-button">
                  Create Account
                </button>
              </div>
            </div>
          </form>

          <div class="divider">
            <span>OR</span>
          </div>

          <button type="button" class="auth-button google-button" id="googleSignUpBtn">
            <svg width="20" height="20" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign up with Google
          </button>

          <div class="auth-redirect">
            <p>Already have an account? <a href="/login">Login</a></p>
          </div>

          <div class="decorative-line-bottom"></div>
        </div>
      </div>
    </div>

    <script>
      function signUpWithGoogle() {
        window.location.href = '/auth/google';
      }

      function togglePasswordVisibility(fieldId) {
        const passwordField = document.getElementById(fieldId);
        const button = passwordField.parentElement.querySelector('.toggle-password');
        const eyeIcon = button.querySelector('.eye-icon');
        
        if (passwordField.type === 'password') {
          passwordField.type = 'text';
          eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
        } else {
          passwordField.type = 'password';
          eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        }
      }
    </script>
  </body>
</html>
